<script type="text/template" id="server-temp-template">
  <div class="bg-white min-h-screen flex flex-col">
    <header class="bg-white border-b px-6 py-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
      <div class="flex items-center">
        <button onclick="showMain()" class="text-gray-500 mr-4 hover:bg-gray-100 p-2 rounded-full transition"><i class="fas fa-arrow-left text-xl"></i></button>
        <h1 class="text-xl font-bold text-gray-800">จัดการอุณหภูมิ Server (DT1)</h1>
      </div>
      <div class="flex space-x-2">
        <button onclick="toggleTempTab('form')" id="temp-tab-form-btn" class="px-4 py-2 rounded-lg font-medium bg-blue-600 text-white shadow-sm transition-all">บันทึกข้อมูล</button>
        <button onclick="toggleTempTab('history')" id="temp-tab-history-btn" class="px-4 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 transition-all">ประวัติย้อนหลัง</button>
      </div>
    </header>

    <div id="temp-form-section" class="flex-grow p-4 max-w-4xl mx-auto w-full pb-20">
      <form id="tempForm" onsubmit="handleTempSubmit(event)" class="space-y-6">
        <!-- Section 1: Temperature Info -->
        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-6">
          <h2 class="font-bold text-lg text-gray-800 flex items-center"><span class="w-2 h-6 bg-blue-600 rounded-full mr-3"></span>ส่วนที่ 1: ข้อมูลอุณหภูมิ</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-2">วันที่ / เวลาบันทึก:</label>
              <input type="text" name="date" id="temp-date" readonly class="w-full px-4 py-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 font-bold cursor-not-allowed">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-2">Shift:</label>
              <input type="text" name="shift" id="temp-shift" readonly class="w-full px-4 py-3 bg-blue-50 border border-blue-200 rounded-xl text-blue-700 font-bold cursor-not-allowed">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-800 mb-2">อุณหภูมิ (°C) <span class="text-red-500">*</span>:</label>
              <input type="number" step="0.1" name="temperature" id="temp-input" required placeholder="เช่น 22.5" oninput="checkTemperature(this.value)" class="w-full px-4 py-3 border-2 border-blue-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-lg font-bold">
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-800 mb-2">สถานะ:</label>
              <input type="text" name="status" id="temp-status" readonly value="ปกติ" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl bg-gray-50 font-bold outline-none cursor-not-allowed">
            </div>
            <div id="temp-note-container" class="md:col-span-2 hidden animate-fade-in">
              <label class="block text-sm font-bold text-red-800 mb-2">หมายเหตุ (กรณีอุณหภูมิผิดปกติ) <span class="text-red-500">*</span>:</label>
              <textarea name="tempNote" id="temp-note" rows="2" placeholder="ระบุสาเหตุหรือการแก้ไขเบื้องต้น..." class="w-full px-4 py-3 border-2 border-red-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all font-bold text-red-700"></textarea>
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-bold text-gray-800 mb-2">ถ่ายรูปหน้าจอมอนิเตอร์อุณหภูมิ <span class="text-red-500">*</span>:</label>
              <div class="mt-1 flex flex-col items-center p-6 border-2 border-dashed border-blue-200 rounded-2xl bg-blue-50 hover:bg-blue-100 transition-all cursor-pointer relative overflow-hidden" onclick="document.getElementById('temp-camera').click()">
                <i class="fas fa-camera text-4xl text-blue-400 mb-2"></i>
                <span class="text-blue-600 font-medium">คลิกเพื่อถ่ายรูปหรือเลือกไฟล์</span>
                <input type="file" id="temp-camera" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this, 'temp-preview')">
                <img id="temp-preview" class="hidden absolute inset-0 w-full h-full object-cover z-0">
                <button type="button" id="temp-remove-btn" onclick="removeImage(event, 'temp-camera', 'temp-preview')" class="hidden absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full shadow-lg z-10"><i class="fas fa-times"></i></button>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: WIFI Check -->
        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-6">
          <h2 class="font-bold text-lg text-gray-800 flex items-center"><span class="w-2 h-6 bg-green-600 rounded-full mr-3"></span>ส่วนที่ 2: ตรวจสอบ WIFI</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="md:col-span-2">
              <label class="block text-sm font-bold text-gray-800 mb-2">สถานะการเชื่อมต่อ <span class="text-red-500">*</span>:</label>
              <div class="grid grid-cols-2 gap-4">
                <label class="flex items-center justify-center p-4 border-2 rounded-xl cursor-pointer transition-all hover:bg-green-50 peer-checked:bg-green-100 border-gray-200" id="wifi-ok-label">
                  <input type="radio" name="wifiStatus" value="เชื่อมต่อได้" checked class="hidden" onchange="handleWifiChange(this)">
                  <span class="font-bold text-gray-600">🟢 เชื่อมต่อได้</span>
                </label>
                <label class="flex items-center justify-center p-4 border-2 rounded-xl cursor-pointer transition-all hover:bg-red-50 border-gray-200" id="wifi-fail-label">
                  <input type="radio" name="wifiStatus" value="เชื่อมต่อไม่ได้" class="hidden" onchange="handleWifiChange(this)">
                  <span class="font-bold text-gray-600">🔴 เชื่อมต่อไม่ได้</span>
                </label>
              </div>
            </div>
            <div id="wifi-note-container" class="md:col-span-2 hidden animate-fade-in">
              <label class="block text-sm font-bold text-red-800 mb-2">หมายเหตุ / สาเหตุที่เชื่อมต่อไม่ได้ <span class="text-red-500">*</span>:</label>
              <textarea name="note" id="wifi-note" rows="2" placeholder="ระบุสาเหตุ..." class="w-full px-4 py-3 border-2 border-red-200 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all font-bold text-red-700"></textarea>
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-bold text-gray-800 mb-2">ถ่ายรูปหน้าจอการเชื่อมต่อ WIFI:</label>
              <div class="mt-1 flex flex-col items-center p-6 border-2 border-dashed border-green-200 rounded-2xl bg-green-50 hover:bg-green-100 transition-all cursor-pointer relative overflow-hidden" onclick="document.getElementById('wifi-camera').click()">
                <i class="fas fa-wifi text-4xl text-green-400 mb-2"></i>
                <span class="text-green-600 font-medium">คลิกเพื่อถ่ายรูปหรือเลือกไฟล์</span>
                <input type="file" id="wifi-camera" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this, 'wifi-preview')">
                <img id="wifi-preview" class="hidden absolute inset-0 w-full h-full object-cover z-0">
                <button type="button" id="wifi-remove-btn" onclick="removeImage(event, 'wifi-camera', 'wifi-preview')" class="hidden absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full shadow-lg z-10"><i class="fas fa-times"></i></button>
              </div>
            </div>
          </div>
        </div>

        <button type="submit" id="tempSubmitBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-xl hover:bg-blue-700 transition-all shadow-lg active:transform active:scale-95">
          <i class="fas fa-save mr-2"></i> บันทึกข้อมูล
        </button>
      </form>
    </div>

    <div id="temp-history-section" class="hidden p-4 max-w-6xl mx-auto w-full pb-20">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="p-6 border-b bg-gray-50 flex justify-between items-center">
          <h2 class="font-bold text-lg text-gray-800">ประวัติย้อนหลัง (50 รายการล่าสุด)</h2>
          <button onclick="loadTempHistory(true)" class="flex items-center text-blue-600 font-medium hover:bg-blue-50 px-3 py-1 rounded-lg transition-all">
            <i class="fas fa-sync-alt mr-2"></i> รีเฟรช
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse min-w-[800px]">
            <thead>
              <tr class="bg-gray-50 text-gray-600 text-sm font-bold">
                <th class="px-6 py-4 border-b">วันที่ / เวลา</th>
                <th class="px-6 py-4 border-b">Shift</th>
                <th class="px-6 py-4 border-b">อุณหภูมิ</th>
                <th class="px-6 py-4 border-b">สถานะ</th>
                <th class="px-6 py-4 border-b">WIFI</th>
                <th class="px-6 py-4 border-b">ผู้บันทึก</th>
                <th class="px-6 py-4 border-b text-center">รูปภาพ</th>
              </tr>
            </thead>
            <tbody id="temp-history-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</script>

<script>
  let tempHistoryCache = null;
  let lastTempFetchTime = 0;

  // ฟังก์ชันนี้ถูกเรียกใช้จาก Index.html เมื่อ switchContent('servertemp')
  function initTempForm() {
    // ใช้ setTimeout เพื่อให้แน่ใจว่า DOM ถูกเรนเดอร์เสร็จแล้ว
    setTimeout(() => {
      updateTempDateTime();
      loadTempHistory();
    }, 100);
    
    // ตั้งค่า Interval สำหรับอัปเดตเวลาแบบ Real-time (ถ้าต้องการ)
    if (window.tempTimeInterval) clearInterval(window.tempTimeInterval);
    window.tempTimeInterval = setInterval(updateTempDateTime, 1000);
  }

  function updateTempDateTime() {
    const el = document.getElementById('temp-date');
    const shiftEl = document.getElementById('temp-shift');
    if (el) {
      const now = new Date();
      // รูปแบบ DD/MM/YYYY HH:mm:ss
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      el.value = `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
      if (shiftEl) shiftEl.value = calculateShift(now);
    }
  }

  function calculateShift(date) {
    const hours = date.getHours();
    const minutes = date.getMinutes();
    const currentTime = hours * 60 + minutes; // เวลาปัจจุบันเป็นนาทีนับจาก 00:00

    // Shift A: 06:30 - 15:30 (390 - 930 นาที)
    const startA = 6 * 60 + 30;
    const endA = 15 * 60 + 30;
    
    // Shift B: 12:30 - 21:30 (750 - 1290 นาที)
    const startB = 12 * 60 + 30;
    const endB = 21 * 60 + 30;
    
    // Shift C: 21:30 - 06:30 (ข้ามคืน)
    const startC = 21 * 60 + 30;
    const endC = 6 * 60 + 30;

    // ตรวจสอบ Shift C ก่อน (กะดึก)
    if (currentTime >= startC || currentTime < endC) return 'Shift C';
    
    // ตรวจสอบ Shift B (มีลำดับความสำคัญสูงกว่า A หากช่วงเวลาทับซ้อนกัน)
    if (currentTime >= startB && currentTime < endB) return 'Shift B';
    
    // ตรวจสอบ Shift A
    if (currentTime >= startA && currentTime < endA) return 'Shift A';
    
    return 'Shift C'; 
  }

  function checkTemperature(val) {
    const statusInput = document.getElementById('temp-status');
    const noteContainer = document.getElementById('temp-note-container');
    const noteInput = document.getElementById('temp-note');
    
    if (val === '') {
      statusInput.value = 'ปกติ';
      noteContainer.classList.add('hidden');
      noteInput.required = false;
      return;
    }

    const temp = parseFloat(val);
    if (temp >= 27) {
      statusInput.value = 'ผิดปกติ';
      noteContainer.classList.remove('hidden');
      noteInput.required = true;
      statusInput.classList.remove('bg-gray-50', 'border-gray-100', 'text-gray-800');
      statusInput.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
    } else {
      statusInput.value = 'ปกติ';
      noteContainer.classList.add('hidden');
      noteInput.required = false;
      noteInput.value = '';
      statusInput.classList.remove('bg-red-50', 'text-red-600', 'border-red-200');
      statusInput.classList.add('bg-gray-50', 'border-gray-100', 'text-gray-800');
    }
  }

  function handleWifiChange(input) {
    const noteContainer = document.getElementById('wifi-note-container');
    const noteInput = document.getElementById('wifi-note');
    const okLabel = document.getElementById('wifi-ok-label');
    const failLabel = document.getElementById('wifi-fail-label');
    
    if (input.value === 'เชื่อมต่อไม่ได้') {
      noteContainer.classList.remove('hidden');
      noteInput.required = true;
      failLabel.className = "flex items-center justify-center p-4 border-2 rounded-xl cursor-pointer transition-all bg-red-100 border-red-500";
      okLabel.className = "flex items-center justify-center p-4 border-2 rounded-xl cursor-pointer transition-all border-gray-200";
    } else {
      noteContainer.classList.add('hidden');
      noteInput.required = false;
      noteInput.value = '';
      okLabel.className = "flex items-center justify-center p-4 border-2 rounded-xl cursor-pointer transition-all bg-green-100 border-green-500";
      failLabel.className = "flex items-center justify-center p-4 border-2 rounded-xl cursor-pointer transition-all border-gray-200";
    }
  }

  function previewImage(input, previewId) {
    const preview = document.getElementById(previewId);
    const removeBtn = document.getElementById(previewId.replace('preview', 'remove-btn'));
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        preview.src = e.target.result;
        preview.classList.remove('hidden');
        removeBtn.classList.remove('hidden');
      }
      reader.readAsDataURL(input.files[0]);
    }
  }

  function removeImage(e, inputId, previewId) {
    e.stopPropagation();
    document.getElementById(inputId).value = '';
    document.getElementById(previewId).src = '';
    document.getElementById(previewId).classList.add('hidden');
    document.getElementById(previewId.replace('preview', 'remove-btn')).classList.add('hidden');
  }

  function toggleTempTab(tab) {
    document.getElementById('temp-form-section').classList.toggle('hidden', tab !== 'form');
    document.getElementById('temp-history-section').classList.toggle('hidden', tab === 'form');
    const btnForm = document.getElementById('temp-tab-form-btn');
    const btnHist = document.getElementById('temp-tab-history-btn');
    if (tab === 'form') {
      btnForm.className = "px-4 py-2 rounded-lg font-medium bg-blue-600 text-white shadow-sm transition-all";
      btnHist.className = "px-4 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 transition-all";
    } else {
      btnForm.className = "px-4 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 transition-all";
      btnHist.className = "px-4 py-2 rounded-lg font-medium bg-blue-600 text-white shadow-sm transition-all";
    }
  }

  async function handleTempSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('tempSubmitBtn');
    const tempFile = document.getElementById('temp-camera').files[0];
    
    if (!tempFile) {
      Swal.fire('กรุณาถ่ายรูป', 'จำเป็นต้องถ่ายรูปหน้าจอมอนิเตอร์อุณหภูมิ', 'warning');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังบันทึกข้อมูล...';

    try {
      const f = e.target;
      const imageDataTemp = await toBase64(tempFile);
      const wifiFile = document.getElementById('wifi-camera').files[0];
      const imageDataWifi = wifiFile ? await toBase64(wifiFile) : "";

      const formData = {
        date: f.date.value,
        shift: f.shift.value,
        temperature: f.temperature.value,
        status: f.status.value,
        tempNote: f.tempNote ? f.tempNote.value : "",
        recorder: currentUser.name,
        wifiStatus: f.wifiStatus.value,
        note: f.note ? f.note.value : "",
        imageDataTemp: imageDataTemp,
        imageDataWifi: imageDataWifi
      };

      google.script.run.withSuccessHandler(function(r) {
        if (r.success) {
          tempHistoryCache = null;
          Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', text: 'ข้อมูลอุณหภูมิถูกบันทึกเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
          f.reset();
          document.getElementById('temp-preview').classList.add('hidden');
          document.getElementById('wifi-preview').classList.add('hidden');
          document.getElementById('temp-note-container').classList.add('hidden');
          document.getElementById('wifi-note-container').classList.add('hidden');
          initTempForm(); // รีเซ็ตเวลาและ Shift หลังบันทึก
          toggleTempTab('history');
        } else {
          Swal.fire('ผิดพลาด', r.message, 'error');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save mr-2"></i> บันทึกข้อมูล';
      }).withFailureHandler(function(err) {
        Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อกับ Server ได้ กรุณาลองใหม่อีกครั้ง', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save mr-2"></i> บันทึกข้อมูล';
      }).submitServerTemp(formData);

    } catch (err) {
      Swal.fire('ผิดพลาด', 'เกิดข้อผิดพลาดในการประมวลผลรูปภาพ', 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save mr-2"></i> บันทึกข้อมูล';
    }
  }

  const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });

  function loadTempHistory(force = false) {
    const tbody = document.getElementById('temp-history-body');
    const now = Date.now();
    if (!force && tempHistoryCache && (now - lastTempFetchTime < 60000)) {
      renderTempHistory(tempHistoryCache);
      return;
    }
    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังโหลดข้อมูล...</td></tr>';
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) {
        tempHistoryCache = r.data;
        lastTempFetchTime = Date.now();
        renderTempHistory(r.data);
      } else {
        tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-red-400">${r.message}</td></tr>`;
      }
    }).getServerTempHistory();
  }

  function renderTempHistory(data) {
    const tbody = document.getElementById('temp-history-body');
    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-10 text-center text-gray-400">ยังไม่มีข้อมูลการบันทึก</td></tr>';
      return;
    }
    const fragment = document.createDocumentFragment();
    data.forEach(i => {
      const tr = document.createElement('tr');
      tr.className = "border-b hover:bg-gray-50 transition-all text-sm";
      tr.innerHTML = `
        <td class="px-6 py-4"><div class="font-bold text-gray-800">${i.date}</div><div class="text-xs text-gray-400">${i.recordTime}</div></td>
        <td class="px-6 py-4"><span class="px-2 py-1 rounded-lg bg-blue-50 text-blue-700 font-bold text-xs">${i.shift}</span></td>
        <td class="px-6 py-4 font-bold text-lg text-blue-600">${i.temperature} °C</td>
        <td class="px-6 py-4">
          <span class="px-2 py-1 rounded-full text-xs font-bold ${i.status === 'ปกติ' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${i.status}</span>
          ${i.tempNote ? `<div class="text-[10px] text-red-500 mt-1 font-bold">${i.tempNote}</div>` : ''}
        </td>
        <td class="px-6 py-4"><div class="font-bold ${i.wifiStatus === 'เชื่อมต่อได้' ? 'text-green-600' : 'text-red-600'}">${i.wifiStatus}</div><div class="text-xs text-gray-400 truncate max-w-[150px]">${i.note || '-'}</div></td>
        <td class="px-6 py-4 text-gray-600 font-medium">${i.recorder}</td>
        <td class="px-6 py-4 text-center">
          <div class="flex justify-center space-x-2">
            ${i.imageTemp ? `<a href="${i.imageTemp}" target="_blank" class="text-blue-500 hover:text-blue-700" title="รูปอุณหภูมิ"><i class="fas fa-thermometer-half text-xl"></i></a>` : ''}
            ${i.imageWifi ? `<a href="${i.imageWifi}" target="_blank" class="text-green-500 hover:text-green-700" title="รูป WIFI"><i class="fas fa-wifi text-xl"></i></a>` : ''}
          </div>
        </td>
      `;
      fragment.appendChild(tr);
    });
    tbody.innerHTML = '';
    tbody.appendChild(fragment);
  }
</script>
