<script type="text/template" id="main-template">
  <div class="flex min-h-screen">
    <!-- Sidebar (Left) -->
    <aside class="w-64 bg-white border-r flex flex-col sticky top-0 h-screen">
      <div class="p-6 border-b flex items-center space-x-3">
        <div class="bg-blue-600 p-2 rounded-lg">
          <i class="fas fa-tools text-white"></i>
        </div>
        <span class="font-bold text-xl text-gray-800">EIO-DMK</span>
      </div>
      
      <nav class="flex-grow p-4 space-y-2">
        <button onclick="switchContent('dashboard')" data-view="dashboard" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-gray-600">
          <i class="fas fa-th-large"></i>
          <span>หน้าแรก</span>
        </button>
        
        <button onclick="switchContent('repair')" data-view="repair" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-gray-600">
          <i class="fas fa-file-alt"></i>
          <span>แบบฟอร์มแจ้งซ่อม</span>
        </button>

        <button onclick="switchContent('servertemp')" data-view="servertemp" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-gray-600">
          <i class="fas fa-thermometer-half"></i>
          <span>อุณหภูมิ Server DT1</span>
        </button>
        
        <button onclick="switchContent('delivery')" data-view="delivery" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-gray-600">
          <i class="fas fa-truck"></i>
          <span>ส่งเอกสาร / พัสดุ</span>
        </button>
        
        <button onclick="switchContent('account')" data-view="account" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition text-gray-600">
          <i class="fas fa-users-cog"></i>
          <span>จัดการผู้ใช้ (Account)</span>
        </button>
      </nav>

      <div class="p-4 border-t">
        <div class="bg-gray-50 p-4 rounded-xl mb-4">
          <p id="user-display-name" class="font-bold text-sm text-gray-800 truncate"></p>
          <p id="user-display-role" class="text-xs text-gray-500"></p>
        </div>
        <button onclick="logout()" class="w-full flex items-center justify-center space-x-2 px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition">
          <i class="fas fa-sign-out-alt"></i>
          <span>ออกจากระบบ</span>
        </button>
      </div>
    </aside>

    <!-- Main Content (Right) -->
    <main id="main-content" class="flex-grow overflow-y-auto">
      <!-- Content will be injected here by switchContent() -->
    </main>
  </div>
</script>

<script>
  let currentUser = null;

  window.onload = function() {
    showLogin();
  };

  function showLogin() {
    document.getElementById('app').innerHTML = document.getElementById('login-template').innerHTML;
  }

  function handleLogin(event) {
    event.preventDefault();
    const form = event.target;
    const btn = form.querySelector('button[type="submit"]');
    const username = form.username.value;
    const password = form.password.value;
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังเข้าสู่ระบบ...';

    google.script.run.withSuccessHandler(function(response) {
      if(response.success) {
        currentUser = response.user;
        Swal.fire({
          icon: 'success',
          title: 'เข้าสู่ระบบสำเร็จ',
          text: 'ยินดีต้อนรับคุณ ' + currentUser.name,
          timer: 1500,
          showConfirmButton: false
        }).then(() => {
          showMain();
        });
      } else {
        Swal.fire({
          icon: 'error',
          title: 'เข้าสู่ระบบไม่สำเร็จ',
          text: response.message
        });
        btn.disabled = false;
        btn.innerText = 'เข้าสู่ระบบ';
      }
    }).login(username, password);
  }

  function showMain() {
    document.getElementById('app').innerHTML = document.getElementById('main-template').innerHTML;
    document.getElementById('user-display-name').innerText = currentUser.name;
    document.getElementById('user-display-role').innerText = currentUser.role;
    
    // Default view
    switchContent('dashboard');
  }

  function switchContent(view) {
    const contentArea = document.getElementById('main-content');
    
    // Update Sidebar Active State
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    const activeItem = document.querySelector(`[data-view="${view}"]`);
    if(activeItem) activeItem.classList.add('active');

    if(view === 'dashboard') {
      contentArea.innerHTML = `
        <div class="p-6">
          <h2 class="text-2xl font-bold text-gray-800 mb-4">ยินดีต้อนรับสู่ EasyAPP EIO-DMK</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onclick="switchContent('repair')" class="bg-white p-8 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer group">
              <div class="bg-blue-50 w-14 h-14 rounded-xl flex items-center justify-center mb-4 group-hover:bg-blue-600 transition duration-300">
                <i class="fas fa-file-alt text-2xl text-blue-600 group-hover:text-white"></i>
              </div>
              <h3 class="text-lg font-bold text-gray-800">แบบฟอร์มแจ้งซ่อม</h3>
              <p class="text-gray-500 text-sm">แจ้งซ่อมทรัพย์สินและอุปกรณ์</p>
            </div>
            <div onclick="switchContent('servertemp')" class="bg-white p-8 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer group">
              <div class="bg-orange-50 w-14 h-14 rounded-xl flex items-center justify-center mb-4 group-hover:bg-orange-600 transition duration-300">
                <i class="fas fa-thermometer-half text-2xl text-orange-600 group-hover:text-white"></i>
              </div>
              <h3 class="text-lg font-bold text-gray-800">อุณหภูมิห้อง Server DT1</h3>
              <p class="text-gray-500 text-sm">บันทึกข้อมูลอุณหภูมิประจำวัน</p>
            </div>
            <div onclick="switchContent('delivery')" class="bg-white p-8 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer group">
              <div class="bg-indigo-50 w-14 h-14 rounded-xl flex items-center justify-center mb-4 group-hover:bg-indigo-600 transition duration-300">
                <i class="fas fa-truck text-2xl text-indigo-600 group-hover:text-white"></i>
              </div>
              <h3 class="text-lg font-bold text-gray-800">ส่งเอกสาร / พัสดุ</h3>
              <p class="text-gray-500 text-sm">จัดการการส่งและติดตามสถานะ</p>
            </div>
          </div>
        </div>
      `;
    } else if(view === 'repair') {
      contentArea.innerHTML = document.getElementById('repair-form-template').innerHTML;
      initRepairForm(); // เรียกใช้ฟังก์ชันเริ่มต้นของฟอร์มใหม่
    } else if(view === 'account') {
      contentArea.innerHTML = document.getElementById('account-template').innerHTML;
      loadUsers();
        } else if(view === 'servertemp') {
      contentArea.innerHTML = document.getElementById('server-temp-template').innerHTML;
      initTempForm();
    } else if(view === 'delivery') {
      contentArea.innerHTML = document.getElementById('delivery-template').innerHTML;
      initDeliveryForm();
    }
  }

  function logout() {
    Swal.fire({
      title: 'ยืนยันการออกจากระบบ?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#3085d6',
      cancelButtonColor: '#d33',
      confirmButtonText: 'ใช่, ออกจากระบบ',
      cancelButtonText: 'ยกเลิก'
    }).then((result) => {
      if (result.isConfirmed) {
        currentUser = null;
        showLogin();
      }
    });
  }
</script>
