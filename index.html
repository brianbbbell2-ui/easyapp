<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyAPP EIO-DMK</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
      body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
      .sidebar-item.active { background-color: #2563eb; color: white; }
      .sidebar-item:not(.active ):hover { background-color: #e2e8f0; }
      .loader {
        border-top-color: #3498db;
        -webkit-animation: spinner 1.5s linear infinite;
        animation: spinner 1.5s linear infinite;
      }
      @-webkit-keyframes spinner { 0% { -webkit-transform: rotate(0deg); } 100% { -webkit-transform: rotate(360deg); } }
      @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app" class="min-h-screen">
      <!-- Loading State -->
      <div id="loading" class="flex flex-col items-center justify-center min-h-screen">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-gray-600">กำลังโหลดระบบ...</p>
      </div>
    </div>

    <!-- Templates -->
    <?!= include('LoginUI'); ?>
    <?!= include('MainUI'); ?>
    <?!= include('RepairFormUI_New'); ?> <!-- เปลี่ยนจาก RepairFormUI เป็น RepairFormUI_New -->
    <?!= include('AccountUI'); ?>
    <?!= include('ServerTempUI'); ?>
    <?!= include('DeliveryUI'); ?>

    <script>
      let currentUser = null;

      window.onload = function() {
        showLogin();
      };

      function showLogin() {
        document.getElementById('app').innerHTML = document.getElementById('login-template').innerHTML;
      }

      function handleLogin(event) {
        event.preventDefault();
        const form = event.target;
        const btn = form.querySelector('button[type="submit"]');
        const username = form.username.value;
        const password = form.password.value;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังเข้าสู่ระบบ...';

        google.script.run.withSuccessHandler(function(response) {
          if(response.success) {
            currentUser = response.user;
            Swal.fire({
              icon: 'success',
              title: 'เข้าสู่ระบบสำเร็จ',
              text: 'ยินดีต้อนรับคุณ ' + currentUser.name,
              timer: 1500,
              showConfirmButton: false
            }).then(() => {
              showMain();
            });
          } else {
            Swal.fire({
              icon: 'error',
              title: 'เข้าสู่ระบบไม่สำเร็จ',
              text: response.message
            });
            btn.disabled = false;
            btn.innerText = 'เข้าสู่ระบบ';
          }
        }).login(username, password);
      }

      function showMain() {
        document.getElementById('app').innerHTML = document.getElementById('main-template').innerHTML;
        document.getElementById('user-display-name').innerText = currentUser.name;
        document.getElementById('user-display-role').innerText = currentUser.role;
        
        // Default view
        switchContent('dashboard');
      }

      function switchContent(view) {
        const contentArea = document.getElementById('main-content');
        
        // Update Sidebar Active State
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.querySelector(`[data-view="${view}"]`);
        if(activeItem) activeItem.classList.add('active');

        if(view === 'dashboard') {
          contentArea.innerHTML = `
            <div class="p-6">
              <h2 class="text-2xl font-bold text-gray-800 mb-4">ยินดีต้อนรับสู่ EasyAPP EIO-DMK</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div onclick="switchContent('repair')" class="bg-white p-8 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer group">
                  <div class="bg-blue-50 w-14 h-14 rounded-xl flex items-center justify-center mb-4 group-hover:bg-blue-600 transition duration-300">
                    <i class="fas fa-file-alt text-2xl text-blue-600 group-hover:text-white"></i>
                  </div>
                  <h3 class="text-lg font-bold text-gray-800">แบบฟอร์มแจ้งซ่อม</h3>
                  <p class="text-gray-500 text-sm">แจ้งซ่อมทรัพย์สินและอุปกรณ์</p>
                </div>
                <div onclick="switchContent('servertemp')" class="bg-white p-8 rounded-2xl shadow-sm border hover:shadow-md transition cursor-pointer group">
                  <div class="bg-orange-50 w-14 h-14 rounded-xl flex items-center justify-center mb-4 group-hover:bg-orange-600 transition duration-300">
                    <i class="fas fa-thermometer-half text-2xl text-orange-600 group-hover:text-white"></i>
                  </div>
                  <h3 class="text-lg font-bold text-gray-800">อุณหภูมิห้อง Server DT1</h3>
                  <p class="text-gray-500 text-sm">บันทึกข้อมูลอุณหภูมิประจำวัน</p>
                </div>
              </div>
            </div>
          `;
        } else if(view === 'repair') {
          contentArea.innerHTML = document.getElementById('repair-form-template').innerHTML;
          initRepairForm();
        } else if(view === 'account') {
          contentArea.innerHTML = document.getElementById('account-template').innerHTML;
          initAccount();
        } else if(view === 'servertemp') {
          contentArea.innerHTML = document.getElementById('server-temp-template').innerHTML;
          initTempForm();
        }
      }

      function logout() {
        Swal.fire({
          title: 'ยืนยันการออกจากระบบ?',
          icon: 'question',
          showCancelButton: true,
          confirmButtonColor: '#3085d6',
          cancelButtonColor: '#d33',
          confirmButtonText: 'ใช่, ออกจากระบบ',
          cancelButtonText: 'ยกเลิก'
        }).then((result) => {
          if (result.isConfirmed) {
            currentUser = null;
            showLogin();
          }
        });
      }
    </script>
  </body>
</html>
